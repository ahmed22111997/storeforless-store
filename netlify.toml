[build]
  command = "node build.js"
  publish = "."

[[edge_functions]]
  path = "/product.html"
  function = "product-meta"

[[redirects]]
  from = "/product/*"
  to = "/product.html"
  status = 200

[[redirects]]
  from = "/category/*"
  to = "/category.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
